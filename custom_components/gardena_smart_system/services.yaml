start_override:
  target:
    entity:
      integration: "gardena_smart_system"
      domain: "lawn_mower"
  fields:
    duration:
      required: true
      example: "3600"
      default: "3600"
      selector:
        number:
          min: 1
          max: 86400
          unit_of_measurement: seconds
          mode: box

reload:
  description: Reload the Gardena Smart System integration.

websocket_diagnostics:
  description: Get WebSocket connection diagnostics and status information.
  response:
    optional: true
  fields:
    detailed:
      description: Include detailed connection information.
      example: true
      default: false
      selector:
        boolean:

sensor_measure:
  description: Trigger an on-demand measurement on a Gardena Smart Sensor.
  fields:
    device_id:
      description: The device ID of the sensor to measure.
      required: true
      example: "d8a1faef-2ee3-421d-a3f8-f8ed577c2ad3"
      selector:
        text:

reconnect_websocket:
  description: Force WebSocket reconnection for the Gardena Smart System integration.